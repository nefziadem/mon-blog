<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block titre %}Mon Blog{% endblock %}</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --ink: #0f0f0f;
            --purple: #7F77DD;
            --purple-dark: #534AB7;
            --coral: #D85A30;
            --paper: #f5f4f0;
            --muted: #888780;
            --border: #D3D1C7;
        }
        body { font-family: 'Inter', sans-serif; background: var(--paper); color: var(--ink); }

        /* NAV */
        nav {
            background: var(--ink);
            padding: 16px 40px;
            display: flex; justify-content: space-between; align-items: center;
            position: sticky; top: 0; z-index: 100;
        }
        .nav-brand { color: white; font-size: 18px; font-weight: 600; text-decoration: none; }
        .nav-links { display: flex; gap: 28px; align-items: center; list-style: none; }
        .nav-links a { color: rgba(255,255,255,0.5); text-decoration: none; font-size: 13px; transition: color 0.2s; }
        .nav-links a:hover { color: white; }
        .nav-cta {
            background: var(--purple); color: white !important;
            padding: 8px 18px; border-radius: 100px; font-weight: 500;
        }

        /* HERO */
        .hero {
            background: var(--ink);
            padding: 80px 40px 100px;
            position: relative; overflow: hidden;
        }
        .hero::before {
            content: '';
            position: absolute; width: 500px; height: 500px;
            background: var(--purple-dark); border-radius: 50%;
            top: -150px; right: -100px; opacity: 0.12;
        }
        .hero::after {
            content: '';
            position: absolute; width: 350px; height: 350px;
            background: var(--coral); border-radius: 50%;
            bottom: -100px; left: 60px; opacity: 0.1;
        }
        .hero-inner { max-width: 1100px; margin: 0 auto; position: relative; z-index: 1; }
        .hero-tag {
            display: inline-flex; align-items: center; gap: 8px;
            background: rgba(127,119,221,0.15);
            border: 0.5px solid rgba(127,119,221,0.4);
            color: #AFA9EC; padding: 6px 16px; border-radius: 100px;
            font-size: 12px; font-weight: 500; margin-bottom: 24px;
        }
        .hero-tag::before {
            content: ''; width: 7px; height: 7px;
            background: var(--purple); border-radius: 50%;
        }
        .hero h1 {
            font-size: clamp(2.5rem, 5vw, 4.5rem);
            font-weight: 600; color: white; line-height: 1.1;
            letter-spacing: -0.03em; margin-bottom: 20px;
        }
        .hero h1 span { color: var(--purple); }
        .hero p { color: rgba(255,255,255,0.4); font-size: 16px; max-width: 480px; line-height: 1.7; margin-bottom: 36px; }
        .hero-btns { display: flex; gap: 12px; }
        .btn-primary {
            background: var(--purple); color: white;
            padding: 13px 24px; border-radius: 10px;
            text-decoration: none; font-weight: 500; font-size: 14px;
            transition: transform 0.15s, opacity 0.15s;
        }
        .btn-primary:hover { transform: translateY(-2px); opacity: 0.9; }
        .btn-secondary {
            border: 0.5px solid rgba(255,255,255,0.2); color: rgba(255,255,255,0.6);
            padding: 13px 24px; border-radius: 10px;
            text-decoration: none; font-size: 14px;
            transition: border-color 0.2s, color 0.2s;
        }
        .btn-secondary:hover { border-color: rgba(255,255,255,0.5); color: white; }

        /* MAIN */
        .main { max-width: 1100px; margin: 0 auto; padding: 60px 40px; }

        .section-label {
            display: flex; align-items: center; gap: 12px; margin-bottom: 28px;
        }
        .section-label span {
            font-size: 10px; font-weight: 600; letter-spacing: 0.12em;
            text-transform: uppercase; color: var(--muted); white-space: nowrap;
        }
        .section-label::after { content: ''; flex: 1; height: 0.5px; background: var(--border); }

        /* FOOTER */
        footer {
            background: var(--ink); color: rgba(255,255,255,0.3);
            text-align: center; padding: 28px;
            font-size: 13px;
        }
        footer span { color: var(--purple); }

        @media (max-width: 600px) {
            nav { padding: 14px 20px; }
            .hero { padding: 60px 20px 80px; }
            .main { padding: 40px 20px; }
        }
    </style>
</head>
<body>

<nav>
    <a href="/" class="nav-brand">✦ Mon Blog</a>
    <ul class="nav-links">
        <li><a href="/">Articles</a></li>
        <li><a href="{% url 'contact' %}" class="nav-cta">Contact</a></li>
    </ul>
</nav>

{% block hero %}{% endblock %}

<div class="main">
    {% block contenu %}{% endblock %}
</div>

<footer>
    <p>© 2025 Mon Blog — Fait avec <span>Django</span> & passion</p>
</footer>

</body>
</html>
