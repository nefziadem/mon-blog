{% extends 'base.html' %}

{% block titre %}{{ article.titre }}{% endblock %}

{% block contenu %}
<div style="max-width: 720px; margin: 0 auto;">
    <a href="{% url 'liste' %}" style="display: inline-flex; align-items: center; gap: 6px; color: #888780; text-decoration: none; font-size: 13px; margin-bottom: 32px;">← Retour</a>

    <div style="font-size: 10px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: #7F77DD; margin-bottom: 12px;">Article</div>
    <h1 style="font-size: clamp(1.8rem, 4vw, 2.8rem); font-weight: 600; line-height: 1.15; letter-spacing: -0.02em; margin-bottom: 16px;">{{ article.titre }}</h1>

    <div style="display: flex; gap: 16px; align-items: center; margin-bottom: 40px; padding-bottom: 28px; border-bottom: 0.5px solid #D3D1C7;">
        <div style="width: 36px; height: 36px; border-radius: 50%; background: linear-gradient(135deg, #534AB7, #7F77DD); display: flex; align-items: center; justify-content: center; color: white; font-size: 13px; font-weight: 600;">{{ article.auteur|first|upper }}</div>
        <div>
            <div style="font-size: 13px; font-weight: 500;">{{ article.auteur }}</div>
            <div style="font-size: 11px; color: #888780;">{{ article.date_creation|date:"d M Y" }}</div>
        </div>
    </div>

    <div style="font-size: 16px; line-height: 1.85; color: #2C2C2A;">
        {{ article.contenu|linebreaks }}
    </div>
</div>
{% endblock %}
